\* ESCALATION-QUORUM-TOO-BYZANTINE / LiveWithEscalation. Expected: VIOLATED —
\* all local proposers Byzantine AND only 1 of 3 external anchors honest
\* (ByzExt = {z2,z3}): even with global GST the escalation seal can never
\* reach 2/3. Distinct break from MCInZoneLiveNoEscGST (no synchrony vs
\* global f >= 1/3) — together they prove BOTH escalation preconditions.
CONSTANT Ranks              <- MCRanks
CONSTANT ByzRanks           <- MCByzRanks
CONSTANT Witnesses          <- MCWit
CONSTANT ByzWit             <- MCByzWit
CONSTANT ExternalAnchors    <- MCExt
CONSTANT ByzExt             <- MCByzExt
CONSTANT GstReachable        = TRUE
CONSTANT ExtGstReachable     = TRUE
CONSTANT EscalationAvailable = TRUE
SPECIFICATION Spec
INVARIANT TypeOK
INVARIANT EscalImpliesSealed
INVARIANT LadderBeforeEscal
PROPERTY LiveWithEscalation
