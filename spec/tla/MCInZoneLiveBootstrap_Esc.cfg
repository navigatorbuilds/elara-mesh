\* BOOTSTRAP-FREEZE-TRAP / LiveWithEscalation. Expected: VIOLATED — single
\* genesis-only rank that is Byzantine (HonestRanks = {}) AND
\* EscalationAvailable = FALSE (the staked<3 carve-out has no escalation
\* path). Nothing seals with NO safety net — neither ladder, committee, nor
\* escalation. The formal "never sit at 2 stakers" invariant; GST is reachable
\* so the freeze is shown structural, not a synchrony artifact.
CONSTANT Ranks              <- MCRanks
CONSTANT ByzRanks           <- MCByzRanks
CONSTANT Witnesses          <- MCWit
CONSTANT ByzWit             <- MCByzWit
CONSTANT ExternalAnchors    <- MCExt
CONSTANT ByzExt             <- MCByzExt
CONSTANT GstReachable        = TRUE
CONSTANT ExtGstReachable     = TRUE
CONSTANT EscalationAvailable = FALSE
SPECIFICATION Spec
INVARIANT TypeOK
INVARIANT EscalImpliesSealed
INVARIANT LadderBeforeEscal
PROPERTY LiveWithEscalation
