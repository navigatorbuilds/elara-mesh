\* GRIND / RecurSealed. Expected: HOLDS — a grindable beacon pins the worst case
\* every epoch, but escalation is in scope, so the chain still seals each epoch
\* (via escalation). The chain survives; only the FAST path is lost (see _Local).
CONSTANT BeaconPeriod = 3
CONSTANT ViableEpochs <- MCViable
CONSTANT EscalationAvailable = TRUE
SPECIFICATION Spec
INVARIANT TypeOK
INVARIANT EscalImpliesSealed
INVARIANT LadderBeforeEscal
PROPERTY RecurSealed
